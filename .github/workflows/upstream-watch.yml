name: Watch Upstream Releases

on:
  schedule:
    - cron: '0 8 * * *'         # daily at 08:00 UTC
  workflow_dispatch:              # manual trigger

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned version
        run: |
          source UPSTREAM.conf
          echo "CURRENT=$UPSTREAM_TAG" >> $GITHUB_ENV
          echo "UPSTREAM_REPO=$UPSTREAM_REPO" >> $GITHUB_ENV

      - name: Fetch latest upstream tag
        run: |
          LATEST=$(git ls-remote --tags --sort=-v:refname \
            $UPSTREAM_REPO 'refs/tags/v*' | head -1 | sed 's|.*refs/tags/||')
          echo "LATEST=$LATEST" >> $GITHUB_ENV
          echo "Current pinned: $CURRENT"
          echo "Latest upstream: $LATEST"

      - name: Compare versions
        id: compare
        run: |
          if [[ "$CURRENT" == "$LATEST" ]]; then
            echo "Up to date with upstream ($CURRENT)"
            echo "new_release=false" >> $GITHUB_OUTPUT
          else
            echo "New upstream release detected: $LATEST (current: $CURRENT)"
            echo "new_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger patch validation against new tag
        if: steps.compare.outputs.new_release == 'true'
        run: |
          gh workflow run patch-ci.yml \
            -f upstream_tag="$LATEST"
          echo "Triggered patch-ci.yml with upstream_tag=$LATEST"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tracking issue for new release
        if: steps.compare.outputs.new_release == 'true'
        run: |
          # Check if an issue already exists for this version
          EXISTING=$(gh issue list --label "upstream-upgrade" --search "$LATEST" --json number --jq 'length')
          if [[ "$EXISTING" -gt 0 ]]; then
            echo "Issue already exists for $LATEST — skipping."
            exit 0
          fi

          gh issue create \
            --title "Upstream release: $LATEST" \
            --label "upstream-upgrade" \
            --body "$(cat <<EOF
          A new upstream release has been detected.

          - **Current pinned version:** \`$CURRENT\`
          - **New upstream version:** \`$LATEST\`
          - **Upstream repo:** $UPSTREAM_REPO

          ## Next steps

          1. Wait for the patch-ci workflow to complete (auto-triggered)
          2. If patches apply cleanly, run: \`./scripts/upgrade-upstream.sh $LATEST\`
          3. If patches fail, regenerate with: \`./scripts/ai-regenerate-patch.sh <patch> $CURRENT $LATEST\`
          4. Review, test, and merge

          _Auto-generated by upstream-watch.yml_
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
