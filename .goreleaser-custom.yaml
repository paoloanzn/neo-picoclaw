# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# Custom fork GoReleaser config — CLI binary only, no Docker/signing
version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: picoclaw
    env:
      - CGO_ENABLED=0
    tags:
      - goolm
      - stdjson
    ldflags:
      - -s -w
      - -X github.com/sipeed/picoclaw/pkg/config.Version={{ .Version }}
      - -X github.com/sipeed/picoclaw/pkg/config.GitCommit={{ .ShortCommit }}
      - -X github.com/sipeed/picoclaw/pkg/config.BuildTime={{ .Date }}
      - -X github.com/sipeed/picoclaw/pkg/config.GoVersion={{ .Env.GOVERSION }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/picoclaw
    ignore:
      - goos: windows
        goarch: arm

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  footer: >-

    ---

    Custom fork of [sipeed/picoclaw](https://github.com/sipeed/picoclaw).
    Built with patches from [PATCHES.md](https://github.com/paoloanzn/picoclaw/blob/main/PATCHES.md).
